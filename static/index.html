<!DOCTYPE html>
<html>
<head>
  <title>Fraud Detection</title>
  <style>
    body { font-family: Arial; max-width: 500px; margin: 50px auto; padding: 20px; }
    input { width: 100%; padding: 8px; margin: 6px 0 14px; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    #result { margin-top: 20px; padding: 16px; border-radius: 6px; font-size: 18px; text-align: center; }
    .fraud { background: #fee2e2; color: #dc2626; }
    .legit { background: #dcfce7; color: #16a34a; }
  </style>
</head>
<body>
  <h2>💳 Credit Card Fraud Detection</h2>

  <label>V14</label>
  <input type="number" id="V14" value="0" step="0.1">
  <label>V10</label>
  <input type="number" id="V10" value="0" step="0.1">
  <label>V12</label>
  <input type="number" id="V12" value="0" step="0.1">
  <label>V17</label>
  <input type="number" id="V17" value="0" step="0.1">
  <label>V4</label>
  <input type="number" id="V4" value="0" step="0.1">
  <label>V3</label>
  <input type="number" id="V3" value="0" step="0.1">
  <label>Amount ($)</label>
  <input type="number" id="Amount" value="100">

  <button onclick="predict()">🔍 Check Transaction</button>
  <div id="result"></div>

  <script>
    async function predict() {
      const data = {
        V14: parseFloat(document.getElementById('V14').value),
        V10: parseFloat(document.getElementById('V10').value),
        V12: parseFloat(document.getElementById('V12').value),
        V17: parseFloat(document.getElementById('V17').value),
        V4:  parseFloat(document.getElementById('V4').value),
        V3:  parseFloat(document.getElementById('V3').value),
        Amount: parseFloat(document.getElementById('Amount').value)
      };

      const res = await fetch('http://localhost:8000/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const json = await res.json();
      const div = document.getElementById('result');

      if (json.prediction === 1) {
        div.className = 'fraud';
        div.innerHTML = `🚨 FRAUD DETECTED<br><small>Confidence: ${(json.fraud_probability * 100).toFixed(2)}%</small>`;
      } else {
        div.className = 'legit';
        div.innerHTML = `✅ Legitimate Transaction<br><small>Fraud Probability: ${(json.fraud_probability * 100).toFixed(2)}%</small>`;
      }
    }
  </script>
</body>
</html>
